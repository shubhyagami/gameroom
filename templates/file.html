<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>{{ filename }} - gameroom</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif; background: #0d1117; color: #c9d1d9; min-height: 100vh; }
  .navbar { background: #161b22; border-bottom: 1px solid #30363d; padding: 0 24px; height: 60px; display: flex; align-items: center; justify-content: space-between; }
  .navbar h1 { font-size: 18px; font-weight: 600; }
  .navbar h1 a { color: #f0f6fc; text-decoration: none; }
  .navbar h1 a:hover { color: #58a6ff; }
  .nav-right { display: flex; gap: 12px; align-items: center; }
  .nav-right a { color: #8b949e; text-decoration: none; font-size: 14px; }
  .nav-right a:hover { color: #58a6ff; }
  .container { max-width: 1200px; margin: 0 auto; padding: 24px; }
  .breadcrumb-bar { font-size: 14px; margin-bottom: 16px; padding: 8px 0; border-bottom: 1px solid #30363d; display: flex; align-items: center; flex-wrap: wrap; }
  .breadcrumb-bar a { color: #58a6ff; text-decoration: none; }
  .breadcrumb-bar a:hover { text-decoration: underline; }
  .breadcrumb-bar .sep { color: #8b949e; margin: 0 6px; }
  .file-header { border: 1px solid #30363d; border-radius: 6px 6px 0 0; background: #161b22; padding: 10px 16px; display: flex; justify-content: space-between; align-items: center; font-size: 14px; }
  .file-header-left { display: flex; align-items: center; gap: 8px; }
  .file-header-left .ext-badge { background: #1f6feb; color: #fff; padding: 2px 8px; border-radius: 4px; font-size: 11px; font-weight: 600; }
  .file-header-right { display: flex; gap: 8px; }
  .file-header-right .btn { padding: 4px 12px; font-size: 12px; border-radius: 6px; border: 1px solid #30363d; background: #21262d; color: #c9d1d9; cursor: pointer; text-decoration: none; transition: 0.2s; }
  .file-header-right .btn:hover { background: #30363d; }
  .code-wrapper { border: 1px solid #30363d; border-top: none; border-radius: 0 0 6px 6px; overflow: hidden; }
  .code-wrapper pre { margin: 0; padding: 16px; background: #0d1117; overflow-x: auto; font-family: 'Consolas', 'Courier New', monospace; font-size: 13px; line-height: 1.5; tab-size: 4; }
  .code-wrapper code { background: transparent; }
  .hljs { background: transparent !important; }
  footer { text-align: center; padding: 24px; color: #8b949e; font-size: 12px; border-top: 1px solid #30363d; margin-top: 40px; }
</style>
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.9.0/styles/github-dark.min.css">
<script src="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.9.0/highlight.min.js"></script>
<script>hljs.highlightAll();</script>
</head>
<body>
  <nav class="navbar">
    <h1><a href="/">gameroom</a></h1>
    <div class="nav-right">
      <a href="/">Code</a>
    </div>
  </nav>
  <div class="container">
    <div class="breadcrumb-bar">
      {% for crumb in breadcrumbs %}
        {% if not loop.first %}<span class="sep">/</span>{% endif %}
        {% if loop.last %}
          <strong>{{ crumb.name }}</strong>
        {% else %}
          <a href="{{ url_for('browse', filepath=crumb.path) if crumb.path else '/' }}">{{ crumb.name }}</a>
        {% endif %}
      {% endfor %}
    </div>
    <div class="file-header">
      <div class="file-header-left">
        <span class="ext-badge">{{ ext }}</span>
        <span>{{ filename }}</span>
        <span style="color:#8b949e; font-size:12px;">{{ size }}</span>
      </div>
      <div class="file-header-right">
        <a href="{{ url_for('raw', filepath=filepath) }}" class="btn" target="_blank">Raw</a>
        <a href="{{ url_for('download', filepath=filepath) }}" class="btn">Download</a>
      </div>
    </div>
    <div class="code-wrapper">
      <pre><code class="language-{{ lang }}">{{ content }}</code></pre>
    </div>
  </div>
  <footer>Hosted on Render</footer>
</body>
</html>
